name: Bug report
description: Something does not work as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in every section — incomplete reports get closed.
  - type: input
    id: cli2mcp-version
    attributes:
      label: cli2mcp version
      placeholder: "0.1.2 (run `cli2mcp --help` if unsure)"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "v22.11.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2 / Ubuntu 24.04 / Windows 11 23H2"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: "Claude Desktop 0.10.x / Cursor 0.45 / Cline / Windsurf / other"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: The full `cli2mcp ...` invocation (or `mcpServers` config block).
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include the error message, stderr output, or unexpected schema.
      render: shell
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction steps
    validations:
      required: true
